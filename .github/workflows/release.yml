name: Release

# Flow: push a tag `vX.Y.Z` → `build` runs all checks and packs → `publish`
# waits for manual approval on the `nuget-release` environment → on approval it
# publishes to nuget.org (via Trusted Publishing / OIDC) and creates the GitHub
# Release. A tag alone therefore builds and tests but never publishes until a
# maintainer approves the gated `publish` job.
on:
  push:
    tags: ['v*.*.*']

# Least privilege at the workflow level; the publish job widens its own scope.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0     # SourceLink wants full history

      - name: Verify tag matches <Version>
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          proj_version="$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)"
          echo "Tag: $tag (version $tag_version) — Directory.Build.props: $proj_version"
          if [ "$tag_version" != "$proj_version" ]; then
            echo "::error::Tag '$tag' does not match <Version>$proj_version</Version> in Directory.Build.props. Bump the version (and CHANGELOG) before tagging."
            exit 1
          fi

      - name: Set up .NET SDKs (8.0 + 10.0)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Format (verify)
        run: dotnet format --verify-no-changes --no-restore

      - name: Build (Release, multi-target)
        run: dotnet build --configuration Release --no-restore -warnaserror

      - name: Test (unit only)
        run: |
          dotnet test --configuration Release --no-build \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg

      # Hand the exact .nupkg + .snupkg to the gated publish job so it pushes
      # the bits that were tested here, byte-for-byte — no rebuild after approval.
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-${{ github.ref_name }}
          path: ./nupkg/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create the GitHub Release
      id-token: write    # OIDC token for NuGet Trusted Publishing
    # The required-reviewer gate on this environment is what makes a tag push
    # pause here until a maintainer approves. Configure reviewers in repo
    # Settings → Environments → nuget-release.
    environment:
      name: nuget-release
      url: https://www.nuget.org/packages/PoliPage
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET SDKs (8.0 + 10.0)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: nupkg-${{ github.ref_name }}
          path: ./nupkg

      # Exchange the GitHub OIDC token for a short-lived (~1h) nuget.org API
      # key. Requires a Trusted Publishing policy on nuget.org pointing at
      # this repo + workflow file (release.yml) + environment (nuget-release).
      # NUGET_USER is the nuget.org profile name (not an email) — set it as a
      # repo secret so it isn't baked into the workflow.
      - name: NuGet login (OIDC → short-lived key)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      # Symbols are embedded in the assembly (DebugType=embedded in
      # Directory.Build.props), so there is no separate .snupkg to push.
      # --skip-duplicate turns a 409 (version already pushed) into a warning
      # so a re-run after a partial failure does not hard-fail.
      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # Lift this version's section out of CHANGELOG.md for the notes.
          notes="$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag { flag=0 }
            flag { print }
          ' CHANGELOG.md)"
          # Mark X.Y.Z-suffix builds (alpha/beta/rc) as prereleases.
          prerelease=""
          case "$version" in *-*) prerelease="--prerelease";; esac
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "::warning::No CHANGELOG section for $version — using auto-generated notes."
            gh release create "$tag" --title "$tag" --verify-tag --generate-notes $prerelease
          else
            printf '%s\n' "$notes" > "$RUNNER_TEMP/release-notes.md"
            gh release create "$tag" --title "$tag" --verify-tag --notes-file "$RUNNER_TEMP/release-notes.md" $prerelease
          fi
