name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'Directory.Build.props'
      - 'global.json'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  # No `release: published` trigger: it re-runs from a tag ref, which the
  # github-pages environment protection rejects. Every release bumps
  # <Version>/CHANGELOG on main first, so the push trigger above already
  # redeploys the docs. Manual redeploys use workflow_dispatch.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET (8.0 + 10.0)
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore .NET deps
        run: dotnet restore src/PoliPage/PoliPage.csproj

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install docs deps
        working-directory: docs
        run: npm install --no-audit --no-fund

      - name: Build docs site (extract + astro build)
        working-directory: docs
        run: npm run build

      - name: Verify index exists
        run: test -s docs/dist/index.html

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
